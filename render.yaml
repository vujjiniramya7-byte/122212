# render.yaml — deploy both services to Render (free tier)
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend (FastAPI RAG API) ─────────────────────────────────────────
  - type: web
    name: nnrg-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false     # enter manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false     # enter manually in Render dashboard
      - key: VECTOR_STORE_BACKEND
        value: faiss
    # NOTE: Disk requires paid plan. On free tier, uploads and vectorstore
    # are stored inside the container and reset on redeploy.
    # The built-in nnrg_knowledge.txt is always available (baked into image).

  # ── Frontend (React + Vite → nginx) ──────────────────────────────────
  - type: web
    name: nnrg-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      # This must match the exact URL of your deployed backend service on Render.
      # Render auto-generates a URL like https://nnrg-backend.onrender.com
      # Update this value if your backend service has a different name.
      - key: BACKEND_URL
        value: https://nnrg-backend.onrender.com
      # fromService lets Render wire this automatically if both services are in the same Blueprint:
      # - key: BACKEND_URL
      #   fromService:
      #     name: nnrg-backend
      #     type: web
      #     property: host
